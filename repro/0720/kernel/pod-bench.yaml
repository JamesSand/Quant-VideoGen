apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-bench
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: qvg-mp100-worker
spec:
  restartPolicy: Never
  hostIPC: true
  hostNetwork: true
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["research-common-h100-047.cloud.together.ai"]
  runtimeClassName: nvidia
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -c '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            export CAMPAIGN_NS=mp100 CAMPAIGN_PROMPTS=repro/0718/prompts100/selected.txt CAMPAIGN_SF_DIR=repro/0718/prompts100
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen && . .venv/bin/activate && . repro/backup/scripts/env_fix.sh && CUDA_VISIBLE_DEVICES=0 .venv/bin/python repro/0720/kernel/bench_speed.py 3 > repro/0720/kernel/bench.log 2>&1
          '
          echo "WORKER 1 DONE"
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "64", memory: 500Gi, nvidia.com/gpu: "8"}
        limits: {cpu: "64", memory: 500Gi, nvidia.com/gpu: "8"}
      securityContext:
        privileged: true
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
