apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-budget-int2-canary
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: budget-int2-canary
spec:
  restartPolicy: Never
  hostIPC: true
  runtimeClassName: nvidia
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - research-common-h100-048.cloud.together.ai
                  - research-common-h100-057.cloud.together.ai
                  - research-common-h100-066.cloud.together.ai
                  - research-common-h100-081.cloud.together.ai
                  - research-common-h100-107.cloud.together.ai
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -lc '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            export GPUS="0 1 2"
            bash repro/0718/scripts/gpu_queue.sh repro/0721/hash_canary_jobs.txt 3
          '
          echo HASH_CANARY_DONE
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "24", memory: 180Gi, nvidia.com/gpu: "3"}
        limits: {cpu: "24", memory: 180Gi, nvidia.com/gpu: "3"}
      securityContext:
        privileged: true
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
