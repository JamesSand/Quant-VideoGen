apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-budget-int2-research
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: budget-int2-research
spec:
  restartPolicy: Never
  hostIPC: true
  runtimeClassName: nvidia
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - research-common-h100-048.cloud.together.ai
                  - research-common-h100-057.cloud.together.ai
                  - research-common-h100-066.cloud.together.ai
                  - research-common-h100-081.cloud.together.ai
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          exec runuser -u zhizhousha -- env HOME=/home/zhizhousha sleep infinity
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
        limits: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
      securityContext:
        privileged: true
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
