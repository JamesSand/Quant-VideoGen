apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-budget-int2-canary-sf
  namespace: zhizhousha
  labels: {owner: zhizhousha, purpose: budget-int2-canary}
spec:
  restartPolicy: Never
  hostIPC: true
  runtimeClassName: nvidia
  nodeSelector: {node-group: default}
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -lc '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
            bash repro/0718/scripts/campaign.sh sf:1:pcahash:0
          '
          echo HASH_CANARY_SF_DONE
      resources:
        requests: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
        limits: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
      volumeMounts:
        - {name: home, mountPath: /home/zhizhousha}
        - {name: shared, mountPath: /shared}
  volumes:
    - name: home
      persistentVolumeClaim: {claimName: home-zhizhousha}
    - name: shared
      persistentVolumeClaim: {claimName: shared-data}
