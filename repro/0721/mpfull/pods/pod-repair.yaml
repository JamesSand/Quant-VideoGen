apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-mpfull-repair
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: qvg-mpfull-worker
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - research-common-h100-036.cloud.together.ai
                  - research-common-h100-048.cloud.together.ai
                  - research-common-h100-053.cloud.together.ai
                  - research-common-h100-057.cloud.together.ai
                  - research-common-h100-066.cloud.together.ai
                  - research-common-h100-081.cloud.together.ai
  runtimeClassName: nvidia
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          python3 -c "import ctypes,sys; sys.exit(0 if ctypes.CDLL('libcuda.so.1').cuInit(0)==0 else 1)" || { echo "CUINIT FAILED - BAD GPU, EXITING"; exit 1; }
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -c '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            export CAMPAIGN_NS=mpfull CAMPAIGN_PROMPTS=repro/0721/promptsfull/selected.txt CAMPAIGN_SF_DIR=repro/0721/promptsfull
            bash repro/0718/scripts/gpu_queue.sh repro/0721/mpfull/jobs_repair.txt 1
          '
          echo "REPAIR DONE"
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "8", memory: 55Gi, nvidia.com/gpu: "1"}
        limits: {cpu: "12", memory: 75Gi, nvidia.com/gpu: "1"}
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
