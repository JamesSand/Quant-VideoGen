apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-mpfull-score2
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: qvg-mpfull-worker
spec:
  restartPolicy: Never
  hostIPC: true
  hostNetwork: true
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["research-common-h100-106.cloud.together.ai"]
  runtimeClassName: nvidia
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -c '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            for g in 0 1 2 3 4 5 6 7; do
              CUDA_VISIBLE_DEVICES=$g .venv/bin/python repro/0721/mpfull/score_mpfull.py $((8+g)) 32 \
                > repro/0718/logs/score_mpfull_s$((8+g)).log 2>&1 &
            done
            wait
          '
          echo "SCORE POD 2 DONE"
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "64", memory: 500Gi, nvidia.com/gpu: "8"}
        limits: {cpu: "64", memory: 500Gi, nvidia.com/gpu: "8"}
      securityContext:
        privileged: true
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
