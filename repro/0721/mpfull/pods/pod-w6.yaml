apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-mpfull-w6
  namespace: zhizhousha
  labels:
    owner: zhizhousha
    purpose: qvg-mpfull-worker
spec:
  restartPolicy: Never
  hostIPC: true
  hostNetwork: true
  nodeSelector:
    node-group: default
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["research-common-h100-073.cloud.together.ai"]
  runtimeClassName: nvidia
  containers:
    - name: worker
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["/bin/bash", "-c"]
      args:
        - |
          if ! id zhizhousha &>/dev/null; then
            useradd -u 1001 -g 0 -d /home/zhizhousha -s /bin/bash -M zhizhousha
          fi
          runuser -u zhizhousha -- env HOME=/home/zhizhousha bash -c '
            cd /home/zhizhousha/workspace/video-project/Quant-VideoGen
            export CAMPAIGN_NS=mpfull CAMPAIGN_PROMPTS=repro/0721/promptsfull/selected.txt CAMPAIGN_SF_DIR=repro/0721/promptsfull
            bash repro/0718/scripts/gpu_queue.sh repro/0721/mpfull/jobs_shard6.txt 6
          '
          echo "MPFULL WORKER 6 DONE"
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
      resources:
        requests: {cpu: "48", memory: 300Gi, nvidia.com/gpu: "6"}
        limits: {cpu: "48", memory: 300Gi, nvidia.com/gpu: "6"}
      securityContext:
        privileged: true
      volumeMounts:
        - name: home
          mountPath: /home/zhizhousha
        - name: shared
          mountPath: /shared
  volumes:
    - name: home
      persistentVolumeClaim:
        claimName: home-zhizhousha
    - name: shared
      persistentVolumeClaim:
        claimName: shared-data
