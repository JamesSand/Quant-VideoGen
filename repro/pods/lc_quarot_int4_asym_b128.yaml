apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-lc-quarot-int4-asym-b128
  labels:
    owner: zhizhousha
    purpose: qvg-quarot-baseline
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
    - name: main
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["bash", "-lc", "bash /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/pod_run_one.sh lc int4 128 0 1 lc_quarot_int4_asym_b128"]
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
        - name: HF_HOME
          value: /shared/huggingface
      resources:
        requests: { cpu: "12", memory: 96Gi, nvidia.com/gpu: "1" }
        limits:   { cpu: "12", memory: 96Gi, nvidia.com/gpu: "1" }
      volumeMounts:
        - { name: home, mountPath: /home/zhizhousha }
        - { name: shared, mountPath: /shared }
        - { name: shm, mountPath: /dev/shm }
  volumes:
    - name: home
      persistentVolumeClaim: { claimName: home-zhizhousha }
    - name: shared
      persistentVolumeClaim: { claimName: shared-data }
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 64Gi }
