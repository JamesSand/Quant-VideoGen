apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-8gpu
  labels:
    owner: zhizhousha
    purpose: qvg-quarot-8gpu
spec:
  restartPolicy: Never
  hostIPC: true
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
    - name: main
      image: nvcr.io/nvidia/pytorch:25.11-py3
      command: ["sleep", "infinity"]
      workingDir: /home/zhizhousha
      env:
        - name: HOME
          value: /home/zhizhousha
        - name: HF_HOME
          value: /shared/huggingface
        - name: NODE_NAME
          valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
      resources:
        requests: { cpu: "90", memory: 640Gi, nvidia.com/gpu: "8" }
        limits:   { cpu: "90", memory: 640Gi, nvidia.com/gpu: "8" }
      volumeMounts:
        - { name: home, mountPath: /home/zhizhousha }
        - { name: shared, mountPath: /shared }
        - { name: shm, mountPath: /dev/shm }
  volumes:
    - name: home
      persistentVolumeClaim: { claimName: home-zhizhousha }
    - name: shared
      persistentVolumeClaim: { claimName: shared-data }
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 128Gi }
