apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-csi-canary
  labels:
    owner: zhizhousha
    purpose: csi-canary
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
  - name: main
    image: nvcr.io/nvidia/pytorch:25.11-py3
    command:
    - bash
    - -lc
    - echo "CSI-OK $(date +%F_%T) node=$NODE_NAME" > /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/backup/race/result_csi_canary.txt
      && ls /shared >/dev/null && echo shared-ok >> /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/backup/race/result_csi_canary.txt
    workingDir: /home/zhizhousha
    env:
    - name: HOME
      value: /home/zhizhousha
    - name: HF_HOME
      value: /shared/huggingface
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    resources:
      requests:
        cpu: '12'
        memory: 96Gi
      limits:
        cpu: '12'
        memory: 96Gi
    volumeMounts:
    - name: home
      mountPath: /home/zhizhousha
    - name: shared
      mountPath: /shared
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: home
    persistentVolumeClaim:
      claimName: home-zhizhousha
  - name: shared
    persistentVolumeClaim:
      claimName: shared-data
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 64Gi
