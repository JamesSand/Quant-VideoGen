apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-var-qvgpro-run3
  labels:
    owner: zhizhousha
    purpose: qvg-varstudy
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
  - name: main
    image: nvcr.io/nvidia/pytorch:25.11-py3
    command:
    - bash
    - -lc
    - bash /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/pod_run_var.sh
      qvgpro 3
    workingDir: /home/zhizhousha
    env:
    - name: HOME
      value: /home/zhizhousha
    - name: HF_HOME
      value: /shared/huggingface
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    resources:
      requests:
        cpu: '12'
        memory: 96Gi
        nvidia.com/gpu: '1'
      limits:
        cpu: '12'
        memory: 96Gi
        nvidia.com/gpu: '1'
    volumeMounts:
    - name: home
      mountPath: /home/zhizhousha
    - name: shared
      mountPath: /shared
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: home
    persistentVolumeClaim:
      claimName: home-zhizhousha
  - name: shared
    persistentVolumeClaim:
      claimName: shared-data
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 64Gi
