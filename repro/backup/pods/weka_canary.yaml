apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-weka-canary
  labels:
    owner: zhizhousha
    purpose: weka-canary
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
  - name: main
    image: nvcr.io/nvidia/pytorch:25.11-py3
    command:
    - bash
    - -lc
    - date +%F_%T > /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/backup/race/result_weka_canary.txt && ls /shared > /dev/null && echo canary-ok
    workingDir: /home/zhizhousha
    env:
    - name: HOME
      value: /home/zhizhousha
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: '1'
        memory: 1Gi
    volumeMounts:
    - name: home
      mountPath: /home/zhizhousha
    - name: shared
      mountPath: /shared
  volumes:
  - name: home
    persistentVolumeClaim:
      claimName: home-zhizhousha
  - name: shared
    persistentVolumeClaim:
      claimName: shared-data
