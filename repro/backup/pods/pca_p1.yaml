apiVersion: v1
kind: Pod
metadata:
  name: zhizhousha-qvg-pca-p1
  labels:
    owner: zhizhousha
    purpose: qvg-pca
spec:
  restartPolicy: Never
  nodeSelector:
    node-group: default
  runtimeClassName: nvidia
  containers:
  - name: main
    image: nvcr.io/nvidia/pytorch:25.11-py3
    command:
    - bash
    - -lc
    - bash /home/zhizhousha/workspace/video-project/Quant-VideoGen/repro/backup/scripts/pod_run_pca.sh
      pca_p1 4 2 ternary mean
    workingDir: /home/zhizhousha
    env:
    - name: HOME
      value: /home/zhizhousha
    - name: HF_HOME
      value: /shared/huggingface
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    resources:
      requests:
        cpu: '12'
        memory: 96Gi
        nvidia.com/gpu: '1'
      limits:
        cpu: '12'
        memory: 96Gi
        nvidia.com/gpu: '1'
    volumeMounts:
    - name: home
      mountPath: /home/zhizhousha
    - name: shared
      mountPath: /shared
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: home
    persistentVolumeClaim:
      claimName: home-zhizhousha
  - name: shared
    persistentVolumeClaim:
      claimName: shared-data
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 64Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: NotIn
            values:
            - research-common-h100-055.cloud.together.ai
            - research-common-h100-059.cloud.together.ai
